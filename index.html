<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guest Guide</title>
  <style>
    :root {
      --bg: #eef0f4;
      --card: #f7f7f8;
      --text: #18213c;
      --muted: #6b7890;
      --border: #273454;
      --primary: #0f1b3d;
      --primary-hover: #162754;
      --shadow: 0 8px 24px rgba(15, 27, 61, 0.08);
      --radius-xl: 26px;
      --radius-lg: 20px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.55;
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 22px;
    }

    .hero {
      background: var(--card);
      border-radius: var(--radius-xl);
      overflow: hidden;
      box-shadow: var(--shadow);
      margin-bottom: 22px;
    }

    .hero img {
      width: 100%;
      height: 320px;
      object-fit: cover;
      display: block;
    }

    .hero-content {
      padding: 28px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(34px, 5vw, 56px);
      line-height: 1.08;
      letter-spacing: -0.03em;
    }

    h2 {
      margin: 0 0 12px;
      font-size: 28px;
      letter-spacing: -0.02em;
    }

    h3 {
      margin: 0 0 10px;
      font-size: 20px;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 18px;
    }

    .space-top {
      margin-top: 18px;
    }

    .button-grid {
      display: grid;
      gap: 14px;
    }

    .lang-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 14px;
      margin-top: 26px;
    }

    .primary-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      margin-top: 22px;
    }

    .docs-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      margin-top: 14px;
    }

    .lang-btn,
    .action-btn,
    .doc-btn,
    .tutorial-btn,
    .mini-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      min-height: 52px;
      padding: 12px 18px;
      border-radius: 18px;
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
      transition: 0.2s ease;
      cursor: pointer;
    }

    .lang-btn {
      min-height: 56px;
      min-width: 180px;
      max-width: 210px;
      padding: 12px 20px;
      background: transparent;
      color: var(--text);
      border: 2px solid var(--border);
      flex: 0 1 210px;
    }

    .lang-btn:hover,
    .lang-btn.active {
      background: #e9edf5;
    }

    .action-btn {
      min-height: 62px;
      background: var(--primary);
      color: #fff;
      border: 2px solid var(--border);
    }

    .action-btn:hover {
      background: var(--primary-hover);
    }

    .doc-btn,
    .tutorial-btn,
    .mini-btn {
      background: transparent;
      color: var(--text);
      border: 2px solid var(--border);
    }

    .doc-btn:hover,
    .tutorial-btn:hover,
    .mini-btn:hover {
      background: #eef2f8;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      padding: 28px;
      margin-bottom: 22px;
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 34px;
    }

    .info-stack {
      display: grid;
      gap: 24px;
    }

    .info-item .label,
    .useful-item .label {
      display: block;
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .info-item .value,
    .useful-item .value {
      font-size: 17px;
      color: var(--text);
      margin-bottom: 2px;
    }

    .info-item .note,
    .useful-item .note {
      font-size: 14px;
      color: var(--muted);
    }

    ul {
      margin: 0;
      padding-left: 22px;
    }

    li + li {
      margin-top: 8px;
    }

    .muted {
      color: var(--muted);
    }

    #access-note {
      margin-top: 16px;
      padding: 14px 16px;
      white-space: pre-line;
      font-weight: 700;
      color: #7a2e16;
      background: #fff4ea;
      border: 1px solid rgba(180, 90, 40, 0.22);
      border-radius: 16px;
    }

    .hidden {
      display: none !important;
    }

    .multiline-text {
      white-space: pre-line;
    }

    .discover-more-card {
      background:
        linear-gradient(135deg, rgba(199, 219, 255, 0.3), rgba(255, 245, 232, 0.85)),
        var(--card);
    }

    .discover-more-text {
      margin-bottom: 18px;
    }

    .discover-more-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      align-items: center;
    }

    .feature-panel {
      margin-top: 20px;
      padding: 20px;
      border: 1px solid rgba(39, 52, 84, 0.14);
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.55);
    }

    .feature-title {
      margin: 0 0 10px;
      font-size: 20px;
    }

    .feature-text {
      margin: 0 0 18px;
    }

    .media-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .guide-figure {
      margin: 0;
    }

    .guide-photo {
      display: block;
      width: 100%;
      height: auto;
      max-height: 420px;
      object-fit: contain;
      object-position: center;
      border-radius: 18px;
      border: 0;
      background: transparent;
    }

    .guide-caption {
      margin-top: 8px;
      font-size: 14px;
      color: var(--muted);
    }

    .tutorial-grid {
      display: grid;
      gap: 20px;
    }

    .tutorial-item {
      padding-top: 20px;
      border-top: 1px solid rgba(39, 52, 84, 0.14);
    }

    .tutorial-item:first-of-type {
      padding-top: 0;
      border-top: 0;
    }

    .tutorial-text {
      margin: 0 0 14px;
    }

    .useful-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 24px;
    }

    .useful-item {
      display: grid;
      gap: 10px;
    }

    .mini-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 6px;
    }

    .tips-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 20px;
    }

    .tips-item {
      padding: 18px;
      border: 1px solid rgba(39, 52, 84, 0.14);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.38);
    }

    .ecosystem-card {
      text-align: center;
      background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
    }

    .ecosystem-kicker {
      display: inline-block;
      margin-bottom: 10px;
      padding: 7px 12px;
      border-radius: 999px;
      border: 1px solid #fed7aa;
      background: #fff7ed;
      color: #9a3412;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .ecosystem-title {
      margin-bottom: 12px;
    }

    .ecosystem-text {
      max-width: 640px;
      margin: 0 auto 18px;
      color: var(--muted);
      font-size: 16px;
    }

    .ecosystem-actions {
      max-width: 360px;
      margin: 0 auto;
    }

    @media (max-width: 900px) {
      .info-grid,
      .useful-grid,
      .tips-grid,
      .media-grid {
        grid-template-columns: 1fr;
        gap: 24px;
      }
    }

    @media (max-width: 700px) {
      .wrap {
        padding: 14px;
      }

      .hero img {
        height: 220px;
      }

      .hero-content,
      .card {
        padding: 20px;
      }

      .primary-grid,
      .docs-grid {
        grid-template-columns: 1fr;
      }

      .lang-grid {
        display: grid;
        grid-template-columns: 1fr;
      }

      .lang-btn {
        max-width: none;
        width: 100%;
      }

      h2 {
        font-size: 24px;
      }
    }
  </style>
</head>

          "Locanda del Feudo - Castelvetro, restaurante en el pueblo medieval.",
          "Agriturismo La Lupa - Castelvetro, agriturismo con cocina típica."
        ],
        discoverMoreTitle: "✨ Otros puntos de interés y cosas que hacer",
        discoverMoreText: "Si quieren enriquecer la estancia con una excursión, una exposición o un evento especial, aquí tienen dos referencias oficiales muy útiles para descubrir qué ocurre entre Módena y Bolonia.",
        discoverModenaBtn: "Eventos Módena",
        discoverBolognaBtn: "Eventos Bolonia",
        ecosystemKicker: "FGA House Solutions",
        ecosystemTitle: "Descubre el Ecosistema FGA",
        ecosystemText: "Experiencias diferentes, un mismo estilo de hospitalidad. Si ya estás pensando en tu próximo viaje, puedes explorar las otras propiedades FGA actualmente disponibles.",
        ecosystemBtn: "Descubre tu próxima estancia"
      }
    };

    function hasContentValue(value) {
      return value !== null && value !== undefined && String(value).trim() !== "";
    }

    function hasContentArray(arr) {
      return Array.isArray(arr) && arr.length > 0;
    }

    function renderList(id, items) {
      const list = document.getElementById(id);
      if (!list) return;
      list.innerHTML = (items || []).map(item => `<li>${item}</li>`).join("");
    }

    function getDocumentForLang(docGroup, lang) {
      if (!docGroup) return "";
      if (typeof docGroup === "string") return docGroup;
      if (docGroup[lang]) return docGroup[lang];
      return docGroup.fallback || "";
    }

    function setHidden(id, hidden) {
      const el = document.getElementById(id);
      if (!el) return;
      el.classList.toggle("hidden", hidden);
    }

    function setText(id, value) {
      const el = document.getElementById(id);
      if (!el) return;
      el.textContent = value || "";
    }

    function setTextOrClear(id, value) {
      const el = document.getElementById(id);
      if (!el) return;
      el.textContent = hasContentValue(value) ? value : "";
    }

    function setTextOrHide(id, value) {
      const el = document.getElementById(id);
      if (!el) return;
      if (hasContentValue(value)) {
        el.textContent = value;
        el.classList.remove("hidden");
      } else {
        el.textContent = "";
        el.classList.add("hidden");
      }
    }

    function setInfoItemVisibility(itemId, labelId, valueId, labelText, valueText, noteId, noteText) {
      const hasValue = hasContentValue(valueText);
      const hasNote = hasContentValue(noteText);
      setTextOrClear(labelId, hasValue || hasNote ? labelText : "");
      setTextOrClear(valueId, valueText);
      if (noteId) {
        setTextOrHide(noteId, noteText);
      }
      setHidden(itemId, !(hasValue || hasNote));
    }

    function applyLinkBehavior(el, href) {
      if (!el) return;
      if (href && href.startsWith("#")) {
        el.removeAttribute("target");
        el.removeAttribute("rel");
      } else {
        el.target = "_blank";
        el.rel = "noopener noreferrer";
      }
    }

    function setButtonVisibility(id, href) {
      const el = document.getElementById(id);
      if (!el) return;
      if (!hasContentValue(href) || href === "#") {
        el.classList.add("hidden");
        el.removeAttribute("href");
        el.removeAttribute("target");
        el.removeAttribute("rel");
      } else {
        el.classList.remove("hidden");
        el.href = href;
        applyLinkBehavior(el, href);
      }
    }

    function setFigure(figureId, imageId, captionId, src, alt, caption) {
      const figure = document.getElementById(figureId);
      const image = document.getElementById(imageId);
      if (!figure || !image) return;

      if (hasContentValue(src)) {
        image.src = src;
        image.alt = alt || "";
        figure.classList.remove("hidden");
      } else {
        image.removeAttribute("src");
        image.alt = "";
        figure.classList.add("hidden");
      }

      if (captionId) {
        setTextOrHide(captionId, caption);
      }
    }

    function updateInfoCardVisibility() {
      const itemIds = [
        "address-item",
        "checkin-item",
        "checkout-item",
        "wifi-item",
        "contact-item",
        "parking-item"
      ];
      const hasVisibleItems = itemIds.some(id => {
        const el = document.getElementById(id);
        return el && !el.classList.contains("hidden");
      });
      setHidden("info-card", !hasVisibleItems);
    }

    function updateDocsGridVisibility() {
      const docsGrid = document.getElementById("docs-grid");
      if (!docsGrid) return;
      const hasVisibleButtons = Array.from(docsGrid.querySelectorAll(".doc-btn")).some(btn => !btn.classList.contains("hidden"));
      setHidden("docs-grid", !hasVisibleButtons);
    }

    function setTutorialItem(itemId, titleId, textId, buttonId, title, text, buttonLabel, href) {
      const hasText = hasContentValue(text);
      const hasButton = hasContentValue(href);
      const hasContent = hasText || hasButton;
      setTextOrClear(titleId, hasContent ? title : "");
      setTextOrClear(textId, text);
      setText(buttonId, buttonLabel || "");
      setButtonVisibility(buttonId, href || "");
      setHidden(itemId, !hasContent);
    }

    function updateTutorialsCardVisibility() {
      const itemIds = [
        "tutorial-alarm-inside-item",
        "tutorial-alarm-exit-item",
        "tutorial-alarm-return-item",
        "tutorial-gate-item",
        "tutorial-shutters-item",
        "tutorial-bins-item"
      ];
      const hasVisibleItems = itemIds.some(id => {
        const el = document.getElementById(id);
        return el && !el.classList.contains("hidden");
      });
      setHidden("tutorials-card", !hasVisibleItems);
    }

    function setLanguage(lang) {
      const t = CONTENT[lang] || CONTENT.it;
      const safeDocuments = PROPERTY.documents || {};
      const safeTutorials = PROPERTY.tutorials || {};
      const safeGuideImages = PROPERTY.guideImages || {};
      const safeNumbers = PROPERTY.usefulNumbers || {};
      const coverImage = document.getElementById("cover-image");

      document.documentElement.lang = lang;
      document.title = `${PROPERTY.apartmentName || t.pageTitle} - ${t.pageTitle}`;

      if (coverImage) {
        if (hasContentValue(PROPERTY.coverImage)) {
          coverImage.src = PROPERTY.coverImage;
          coverImage.alt = PROPERTY.apartmentName || t.pageTitle;
          coverImage.classList.remove("hidden");
        } else {
          coverImage.removeAttribute("src");
          coverImage.alt = "";
          coverImage.classList.add("hidden");
        }
      }

      setText("apartment-name", PROPERTY.apartmentName);
      setText("subtitle-1", t.subtitle1);
      setText("subtitle-2", t.subtitle2);

      setText("map-btn", t.mapBtn);
      setButtonVisibility("map-btn", PROPERTY.mapsUrl || "");
      setText("whatsapp-btn", t.whatsappBtn);
      setButtonVisibility("whatsapp-btn", PROPERTY.whatsappUrl || "");

      const rulesDoc = getDocumentForLang(safeDocuments.rules, lang);
      const petDoc = getDocumentForLang(safeDocuments.pet, lang);
      setText("rules-btn", t.rulesBtn);
      setButtonVisibility("rules-btn", rulesDoc);
      setText("pet-btn", t.petBtn);
      setButtonVisibility("pet-btn", petDoc);
      updateDocsGridVisibility();

      const wifiPasswordText = hasContentValue(PROPERTY.wifiPassword) ? `${t.wifiPasswordLabel}: ${PROPERTY.wifiPassword}` : "";
      setInfoItemVisibility("address-item", "label-address", "address-value", t.labelAddress, PROPERTY.address);
      setInfoItemVisibility("checkin-item", "label-checkin", "checkin-value", t.labelCheckin, PROPERTY.checkin);
      setInfoItemVisibility("checkout-item", "label-checkout", "checkout-value", t.labelCheckout, PROPERTY.checkout);
      setInfoItemVisibility("wifi-item", "label-wifi", "wifi-name", t.wifiLabel, PROPERTY.wifiName, "wifi-password", wifiPasswordText);
      setInfoItemVisibility("contact-item", "label-contact", "contact-value", t.labelContact, PROPERTY.whatsappDisplay, "contact-note", t.contactNote);
      setInfoItemVisibility("parking-item", "label-parking", "parking-short", t.labelParking, t.parkingShort);
      updateInfoCardVisibility();

      const hasAccessKeyboxContent =
        hasContentValue(t.accessKeyboxTitle) ||
        hasContentValue(t.accessKeyboxText) ||
        hasContentValue(safeGuideImages.keyboxWideImage) ||
        hasContentValue(safeGuideImages.keyboxDetailImage);

      const hasAccessContent = hasContentValue(t.accessText) || hasContentValue(t.accessNote) || hasAccessKeyboxContent;
      setTextOrClear("access-title", hasAccessContent ? t.accessTitle : "");
      setTextOrClear("access-text", t.accessText);
      setTextOrClear("access-keybox-title", t.accessKeyboxTitle);
      setTextOrClear("access-keybox-text", t.accessKeyboxText);
      setFigure("access-keybox-wide-figure", "access-keybox-wide-image", "access-keybox-wide-caption", safeGuideImages.keyboxWideImage, t.accessKeyboxTitle, t.accessKeyboxWideCaption);
      setFigure("access-keybox-detail-figure", "access-keybox-detail-image", "access-keybox-detail-caption", safeGuideImages.keyboxDetailImage, t.accessKeyboxTitle, t.accessKeyboxDetailCaption);
      setHidden("access-keybox-panel", !hasAccessKeyboxContent);
      setTextOrHide("access-note", t.accessNote);
      setHidden("access-card", !hasAccessContent);

      setTextOrClear("tutorials-title", t.tutorialsTitle);
      setTutorialItem("tutorial-alarm-inside-item", "tutorial-alarm-inside-title", "tutorial-alarm-inside-text", "tutorial-alarm-inside-btn", t.tutorialAlarmInsideTitle, t.tutorialAlarmInsideText, t.tutorialBtn, safeTutorials.alarmInsideVideo);
      setTutorialItem("tutorial-alarm-exit-item", "tutorial-alarm-exit-title", "tutorial-alarm-exit-text", "tutorial-alarm-exit-btn", t.tutorialAlarmExitTitle, t.tutorialAlarmExitText, t.tutorialBtn, safeTutorials.alarmExitVideo);
      setTutorialItem("tutorial-alarm-return-item", "tutorial-alarm-return-title", "tutorial-alarm-return-text", "tutorial-alarm-return-btn", t.tutorialAlarmReturnTitle, t.tutorialAlarmReturnText, t.tutorialBtn, safeTutorials.alarmReturnVideo);
      const hasTutorialGateContent =
        hasContentValue(t.tutorialGateTitle) ||
        hasContentValue(t.tutorialGateText) ||
        hasContentValue(safeGuideImages.gateWideImage) ||
        hasContentValue(safeGuideImages.gateDetailImage);
      setTextOrClear("tutorial-gate-title", t.tutorialGateTitle);
      setTextOrClear("tutorial-gate-text", t.tutorialGateText);
      setFigure("tutorial-gate-wide-figure", "tutorial-gate-wide-image", "tutorial-gate-wide-caption", safeGuideImages.gateWideImage, t.tutorialGateTitle, t.tutorialGateWideCaption);
      setFigure("tutorial-gate-detail-figure", "tutorial-gate-detail-image", "tutorial-gate-detail-caption", safeGuideImages.gateDetailImage, t.tutorialGateTitle, t.tutorialGateDetailCaption);
      setHidden("tutorial-gate-item", !hasTutorialGateContent);
      setTutorialItem("tutorial-shutters-item", "tutorial-shutters-title", "tutorial-shutters-text", "tutorial-shutters-btn", t.tutorialShuttersTitle, t.tutorialShuttersText, t.tutorialBtn, safeTutorials.shuttersVideo);
      setTutorialItem("tutorial-bins-item", "tutorial-bins-title", "tutorial-bins-text", "tutorial-bins-btn", t.tutorialBinsTitle, t.tutorialBinsText, t.tutorialBtn, safeTutorials.binsVideo);
      updateTutorialsCardVisibility();

      const hasRulesContent = hasContentArray(t.rulesList);
      setTextOrClear("rules-title", hasRulesContent ? t.rulesTitle : "");
      renderList("rules-list", hasRulesContent ? t.rulesList : []);
      setHidden("rules-card", !hasRulesContent);

      const hasPetRules = hasContentArray(t.petRulesList) || hasContentValue(t.petRulesIntro);
      setTextOrClear("pet-rules-title", hasPetRules ? t.petRulesTitle : "");
      setTextOrClear("pet-rules-intro", t.petRulesIntro);
      renderList("pet-rules-list", hasPetRules ? t.petRulesList : []);
      setHidden("pet-rules-card", !hasPetRules);

      const hasWasteContent = hasContentValue(t.wasteText) || hasContentValue(t.wasteNote);
      setTextOrClear("waste-title", hasWasteContent ? t.wasteTitle : "");
      setTextOrClear("waste-text", t.wasteText);
      setTextOrHide("waste-note", t.wasteNote);
      setHidden("waste-card", !hasWasteContent);

      setTextOrClear("useful-numbers-title", t.usefulNumbersTitle);
      setTextOrClear("emergency-title", t.emergencyTitle);
      setTextOrClear("emergency-112", safeNumbers.emergency112);
      setTextOrClear("emergency-118", safeNumbers.emergency118);
      setTextOrClear("emergency-115", safeNumbers.emergency115);
      setTextOrClear("taxi-title", t.taxiTitle);
      setTextOrClear("taxi-phone-text", safeNumbers.taxiPhoneDisplay);
      setTextOrClear("taxi-whatsapp-text", safeNumbers.taxiWhatsappDisplay);
      setText("taxi-call-btn", t.taxiCallBtn);
      setText("taxi-wa-btn", t.taxiWaBtn);
      setButtonVisibility("taxi-call-btn", safeNumbers.taxiPhoneHref);
      setButtonVisibility("taxi-wa-btn", safeNumbers.taxiWhatsappHref);

      const hasCheckoutContent = hasContentArray(t.checkoutList);
      setTextOrClear("checkout-title", hasCheckoutContent ? t.checkoutTitle : "");
      renderList("checkout-list", hasCheckoutContent ? t.checkoutList : []);
      setHidden("checkout-card", !hasCheckoutContent);

      const hasBreakfast = hasContentArray(t.breakfastList);
      const hasAperitivo = hasContentArray(t.aperitivoList);
      const hasRestaurants = hasContentArray(t.restaurantsList);

      if (hasBreakfast || hasAperitivo || hasRestaurants) {
        setHidden("suggestions-card", false);
        setText("suggestions-title", t.suggestionsTitle);

        if (hasBreakfast) {
          setHidden("breakfast-block", false);
          setText("breakfast-title", t.breakfastTitle);
          renderList("breakfast-list", t.breakfastList);
        } else {
          setHidden("breakfast-block", true);
          renderList("breakfast-list", []);
        }

        if (hasAperitivo) {
          setHidden("aperitivo-block", false);
          setText("aperitivo-title", t.aperitivoTitle);
          renderList("aperitivo-list", t.aperitivoList);
        } else {
          setHidden("aperitivo-block", true);
          renderList("aperitivo-list", []);
        }

        if (hasRestaurants) {
          setHidden("restaurants-block", false);
          setText("restaurants-title", t.restaurantsTitle);
          renderList("restaurants-list", t.restaurantsList);
        } else {
          setHidden("restaurants-block", true);
          renderList("restaurants-list", []);
        }
      } else {
        setHidden("suggestions-card", true);
      }

      const hasDiscoverMoreContent = hasContentValue(t.discoverMoreTitle) || hasContentValue(t.discoverMoreText);
      setTextOrClear("discover-more-title", hasDiscoverMoreContent ? t.discoverMoreTitle : "");
      setTextOrClear("discover-more-text", t.discoverMoreText);
      setText("discover-modena-btn", t.discoverModenaBtn);
      setText("discover-bologna-btn", t.discoverBolognaBtn);
      setButtonVisibility("discover-modena-btn", "https://www.visitmodena.it/it/eventi");
      setButtonVisibility("discover-bologna-btn", "https://www.bolognawelcome.com/it/eventi");
      setHidden("discover-more-card", !hasDiscoverMoreContent);

      setText("ecosystem-kicker", t.ecosystemKicker);
      setText("ecosystem-title", t.ecosystemTitle);
      setText("ecosystem-text", t.ecosystemText);
      setText("ecosystem-btn", t.ecosystemBtn);

      document.querySelectorAll(".lang-btn").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.lang === lang);
      });

      try {
        localStorage.setItem("guestGuideLang", lang);
      } catch (e) {}
    }

    document.querySelectorAll(".lang-btn").forEach(btn => {
      btn.addEventListener("click", () => setLanguage(btn.dataset.lang));
    });

    let savedLang = "it";
    try {
      savedLang = localStorage.getItem("guestGuideLang") || "it";
    } catch (e) {}

    setLanguage(savedLang);
  </script>
</body>
</html>
